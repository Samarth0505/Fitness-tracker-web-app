<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fitness Tracker</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md fitness-card animate-fade">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-neon-green/10 text-neon-green rounded-full mb-4">
                <i class="fas fa-bolt fa-2x"></i>
            </div>
            <h1 class="text-2xl font-bold">Welcome Back</h1>
            <p class="text-slate-400">Log in to your fitness dashboard</p>
        </div>

        <form class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Email Address</label>
                <input type="email" id="email" class="input-dark" placeholder="name@example.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <input type="password" id="password" class="input-dark" placeholder="••••••••">
            </div>

            <button type="submit" id="loginBtn" class="btn-neon w-full py-3 mt-2">
                Login <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <p class="text-center mt-6 text-slate-400">
            Don't have an account? 
            <a href="register.html" class="text-neon-green font-semibold hover:underline">Register here</a>
        </p>
    </div>

    <script src="/script.js"></script>
</body>
</html>
