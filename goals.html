<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals - Fitness Tracker</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50">
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2 text-emerald-600 font-bold text-xl">
                    <i class="fas fa-heartbeat"></i>
                    <span>FitTrack</span>
                </div>
                <div class="hidden md:flex items-center gap-4">
                    <a href="dashboard.html" class="nav-link">Dashboard</a>
                    <a href="activity.html" class="nav-link">Activities</a>
                    <a href="goals.html" class="nav-link active">Goals</a>
                    <button id="logoutBtn" class="ml-4 text-slate-500 hover:text-red-500 transition-colors">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="max-w-3xl mx-auto">
            <header class="mb-8 text-center">
                <h1 class="text-3xl font-bold text-slate-900">Set Your Goals</h1>
                <p class="text-slate-500">Define your targets and track your progress.</p>
            </header>

            <div class="fitness-card mb-8">
                <h2 class="text-xl font-bold mb-6">Update Goals</h2>
                <form class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Daily Steps Goal</label>
                        <input type="number" id="stepsGoal" class="input-field" placeholder="10000">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Daily Calories Goal</label>
                        <input type="number" id="caloriesGoal" class="input-field" placeholder="2000">
                    </div>
                    <div class="md:col-span-2">
                        <button type="button" id="saveGoalBtn" class="btn-primary w-full py-3">
                            <i class="fas fa-save"></i> Save Goals
                        </button>
                    </div>
                </form>
            </div>

            <div class="fitness-card">
                <h2 class="text-xl font-bold mb-6">Current Progress</h2>
                
                <div class="space-y-8">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-semibold text-slate-700">Calories Burned</span>
                            <span id="calProgressText" class="text-sm font-bold text-emerald-600">0 / 2000 kcal</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-4 overflow-hidden">
                            <div id="calProgress" class="bg-emerald-500 h-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="bg-blue-50 p-6 rounded-2xl flex items-center gap-6">
                        <div class="w-16 h-16 bg-blue-500 text-white rounded-full flex items-center justify-center text-2xl">
                            <i class="fas fa-trophy"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-blue-900">Keep it up!</h4>
                            <p class="text-blue-700 text-sm">You're making great progress towards your daily targets. Consistency is key!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/script.js"></script>
</body>
</html>
