<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Fitness Tracker</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50">
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2 text-emerald-600 font-bold text-xl">
                    <i class="fas fa-heartbeat"></i>
                    <span>FitTrack</span>
                </div>
                <div class="hidden md:flex items-center gap-4">
                    <a href="dashboard.html" class="nav-link active">Dashboard</a>
                    <a href="activity.html" class="nav-link">Activities</a>
                    <a href="goals.html" class="nav-link">Goals</a>
                    <button id="logoutBtn" class="ml-4 text-slate-500 hover:text-red-500 transition-colors">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
                <div class="md:hidden">
                    <button class="text-slate-500"><i class="fas fa-bars"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-900">Welcome, <span id="welcomeUser" class="text-emerald-600">User</span></h1>
            <p class="text-slate-500">Here's your fitness summary for today.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="fitness-card flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-100 text-blue-500 rounded-xl flex items-center justify-center">
                    <i class="fas fa-shoe-prints fa-lg"></i>
                </div>
                <div>
                    <p class="text-sm text-slate-500 font-medium">Steps Count</p>
                    <h2 class="text-2xl font-bold" id="stepsCount">0</h2>
                </div>
            </div>

            <div class="fitness-card flex items-center gap-4">
                <div class="w-12 h-12 bg-orange-100 text-orange-500 rounded-xl flex items-center justify-center">
                    <i class="fas fa-fire fa-lg"></i>
                </div>
                <div>
                    <p class="text-sm text-slate-500 font-medium">Calories Burned</p>
                    <h2 class="text-2xl font-bold"><span id="caloriesBurned">0</span> kcal</h2>
                </div>
            </div>

            <div class="fitness-card flex items-center gap-4">
                <div class="w-12 h-12 bg-purple-100 text-purple-500 rounded-xl flex items-center justify-center">
                    <i class="fas fa-running fa-lg"></i>
                </div>
                <div>
                    <p class="text-sm text-slate-500 font-medium">Total Activities</p>
                    <h2 class="text-2xl font-bold" id="totalActivities">0</h2>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="fitness-card">
                <h3 class="text-xl font-bold mb-4">Quick Actions</h3>
                <div class="grid grid-cols-2 gap-4">
                    <a href="activity.html" class="btn-primary py-4 h-auto flex-col text-center">
                        <i class="fas fa-plus-circle text-2xl mb-2"></i>
                        <span>Add Activity</span>
                    </a>
                    <a href="goals.html" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-4 rounded-lg transition-colors flex flex-col items-center justify-center gap-2">
                        <i class="fas fa-bullseye text-2xl mb-2"></i>
                        <span>Set Goals</span>
                    </a>
                </div>
            </div>

            <div class="fitness-card">
                <h3 class="text-xl font-bold mb-4">Daily Motivation</h3>
                <div class="bg-emerald-50 border-l-4 border-emerald-500 p-4 rounded-r-lg">
                    <p class="italic text-emerald-800">"The only bad workout is the one that didn't happen."</p>
                    <p class="text-sm text-emerald-600 mt-2 font-semibold">— Unknown</p>
                </div>
            </div>
        </div>
    </main>

    <script src="/script.js"></script>
</body>
</html>
