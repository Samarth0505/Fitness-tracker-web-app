<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Fitness Tracker</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="border-b border-white/5 sticky top-0 z-10 bg-black/50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2 text-neon-green font-black text-2xl italic">
                    <i class="fas fa-bolt"></i>
                    <span>NEONFIT</span>
                </div>
                <div class="hidden md:flex items-center gap-2">
                    <a href="dashboard.html" class="nav-link active">Dashboard</a>
                    <a href="workout.html" class="nav-link">Workout</a>
                    <a href="progress.html" class="nav-link">Progress</a>
                    <button id="logoutBtn" class="ml-4 text-slate-400 hover:text-red-500 transition-colors">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <header class="mb-8 animate-fade">
            <h1 class="text-4xl font-black italic mb-2">Welcome, <span id="welcomeUser" class="text-neon-green">User</span></h1>
            <p class="text-slate-400" id="motivationalQuote">Loading motivation...</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="fitness-card flex flex-col gap-2">
                <div class="flex items-center justify-between">
                    <span class="text-slate-400 font-medium">Calories Burned</span>
                    <i class="fas fa-fire text-orange-500"></i>
                </div>
                <div class="stat-value"><span id="totalCaloriesBurned">0</span> <span class="text-sm text-slate-500">kcal</span></div>
            </div>

            <div class="fitness-card flex flex-col gap-2">
                <div class="flex items-center justify-between">
                    <span class="text-slate-400 font-medium">Total Workouts</span>
                    <i class="fas fa-dumbbell text-neon-green"></i>
                </div>
                <div class="stat-value" id="totalWorkoutsCount">0</div>
            </div>

            <div class="fitness-card flex flex-col gap-2">
                <div class="flex items-center justify-between">
                    <span class="text-slate-400 font-medium">Total Duration</span>
                    <i class="fas fa-clock text-blue-400"></i>
                </div>
                <div class="stat-value"><span id="totalDurationCount">0</span> <span class="text-sm text-slate-500">mins</span></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <!-- Step Tracker UI -->
                <div class="fitness-card">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="fas fa-shoe-prints text-neon-green"></i> Daily Steps
                    </h3>
                    <div class="flex items-center justify-between mb-4">
                        <div class="text-4xl font-black italic">8,432 <span class="text-sm text-slate-500">/ 10,000</span></div>
                        <div class="text-neon-green font-bold">84%</div>
                    </div>
                    <div class="w-full bg-white/5 h-3 rounded-full overflow-hidden">
                        <div class="bg-neon-green h-full shadow-[0_0_10px_rgba(204,255,0,0.5)]" style="width: 84%"></div>
                    </div>
                </div>

                <!-- Navigation -->
                <div class="grid grid-cols-2 gap-4">
                    <a href="workout.html" class="btn-neon py-6 flex-col">
                        <i class="fas fa-plus-circle text-2xl mb-2"></i>
                        <span>Go to Workout Page</span>
                    </a>
                    <a href="progress.html" class="fitness-card py-6 flex flex-col items-center justify-center gap-2 hover:border-neon-green">
                        <i class="fas fa-chart-line text-2xl mb-2 text-neon-green"></i>
                        <span>View Progress</span>
                    </a>
                </div>
            </div>

            <!-- BMI Calculator -->
            <div class="fitness-card">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i class="fas fa-calculator text-neon-green"></i> BMI Calculator
                </h3>
                <div class="space-y-4">
                    <input type="number" id="bmiWeight" class="input-dark" placeholder="Weight (kg)">
                    <input type="number" id="bmiHeight" class="input-dark" placeholder="Height (cm)">
                    <button id="calculateBmiBtn" class="btn-neon w-full">Calculate</button>
                    <div id="bmiResult" class="text-center font-bold text-neon-green mt-4"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="/script.js"></script>
</body>
</html>
