<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activities - Fitness Tracker</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50">
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2 text-emerald-600 font-bold text-xl">
                    <i class="fas fa-heartbeat"></i>
                    <span>FitTrack</span>
                </div>
                <div class="hidden md:flex items-center gap-4">
                    <a href="dashboard.html" class="nav-link">Dashboard</a>
                    <a href="activity.html" class="nav-link active">Activities</a>
                    <a href="goals.html" class="nav-link">Goals</a>
                    <button id="logoutBtn" class="ml-4 text-slate-500 hover:text-red-500 transition-colors">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Form Section -->
            <div class="lg:col-span-1">
                <div class="fitness-card sticky top-24">
                    <h2 class="text-xl font-bold mb-6">Add New Activity</h2>
                    <form class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Activity Type</label>
                            <select id="activityType" class="input-field">
                                <option value="Running">Running</option>
                                <option value="Walking">Walking</option>
                                <option value="Gym">Gym</option>
                                <option value="Cycling">Cycling</option>
                                <option value="Swimming">Swimming</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Duration (minutes)</label>
                            <input type="number" id="duration" class="input-field" placeholder="30">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Calories Burned</label>
                            <input type="number" id="calories" class="input-field" placeholder="250">
                        </div>
                        <button type="button" id="addActivityBtn" class="btn-primary w-full py-3">
                            <i class="fas fa-plus"></i> Add Activity
                        </button>
                    </form>
                </div>
            </div>

            <!-- List Section -->
            <div class="lg:col-span-2">
                <div class="mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <h2 class="text-2xl font-bold text-slate-900">Recent Activities</h2>
                    <div class="relative w-full sm:w-64">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fas fa-search"></i>
                        </span>
                        <input type="text" id="searchBox" class="input-field pl-10" placeholder="Search activities...">
                    </div>
                </div>

                <div id="activityList" class="space-y-4">
                    <!-- Activities will be injected here -->
                    <div class="text-center py-12 text-slate-400">
                        <i class="fas fa-history fa-3x mb-4"></i>
                        <p>No activities found. Start moving!</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/script.js"></script>
</body>
</html>
