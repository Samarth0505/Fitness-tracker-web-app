<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout - Fitness Tracker</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="border-b border-white/5 sticky top-0 z-10 bg-black/50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2 text-neon-green font-black text-2xl italic">
                    <i class="fas fa-bolt"></i>
                    <span>NEONFIT</span>
                </div>
                <div class="hidden md:flex items-center gap-2">
                    <a href="dashboard.html" class="nav-link">Dashboard</a>
                    <a href="workout.html" class="nav-link active">Workout</a>
                    <a href="progress.html" class="nav-link">Progress</a>
                    <button id="logoutBtn" class="ml-4 text-slate-400 hover:text-red-500 transition-colors">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Form Section -->
            <div class="lg:col-span-1">
                <div class="fitness-card sticky top-24">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="fas fa-plus-circle text-neon-green"></i> Add Workout
                    </h2>
                    <form class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Workout Name</label>
                            <input type="text" id="workoutName" class="input-dark" placeholder="e.g. Morning Run">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Duration (minutes)</label>
                            <input type="number" id="duration" class="input-dark" placeholder="30">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1">Calories Burned</label>
                            <input type="number" id="calories" class="input-dark" placeholder="250">
                        </div>
                        <button type="button" id="addWorkoutBtn" class="btn-neon w-full py-3">
                            <i class="fas fa-plus"></i> Add Workout
                        </button>
                    </form>
                </div>
            </div>

            <!-- List Section -->
            <div class="lg:col-span-2">
                <div class="mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <h2 class="text-2xl font-black italic">Recent Workouts</h2>
                    <div class="relative w-full sm:w-64">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                            <i class="fas fa-search"></i>
                        </span>
                        <input type="text" id="searchBox" class="input-dark pl-10" placeholder="Search workouts...">
                    </div>
                </div>

                <div id="workoutList" class="space-y-4">
                    <!-- Workouts will be injected here -->
                    <div class="text-center py-12 text-slate-500">
                        <i class="fas fa-history fa-3x mb-4"></i>
                        <p>No workouts found. Time to sweat!</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/script.js"></script>
</body>
</html>
