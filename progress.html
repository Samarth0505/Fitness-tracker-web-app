<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress - Fitness Tracker</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="border-b border-white/5 sticky top-0 z-10 bg-black/50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2 text-neon-green font-black text-2xl italic">
                    <i class="fas fa-bolt"></i>
                    <span>NEONFIT</span>
                </div>
                <div class="hidden md:flex items-center gap-2">
                    <a href="dashboard.html" class="nav-link">Dashboard</a>
                    <a href="workout.html" class="nav-link">Workout</a>
                    <a href="progress.html" class="nav-link active">Progress</a>
                    <button id="logoutBtn" class="ml-4 text-slate-400 hover:text-red-500 transition-colors">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-3xl font-black italic">Your Progress</h1>
            <button id="clearProgressBtn" class="text-red-500 hover:text-red-400 font-bold transition-colors">
                <i class="fas fa-trash-alt"></i> Clear Progress
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="fitness-card text-center">
                <p class="text-slate-400 mb-1">Total Workouts</p>
                <div class="stat-value" id="totalWorkouts">0</div>
            </div>
            <div class="fitness-card text-center">
                <p class="text-slate-400 mb-1">Total Calories</p>
                <div class="stat-value"><span id="totalCalories">0</span> <span class="text-sm">kcal</span></div>
            </div>
            <div class="fitness-card text-center">
                <p class="text-slate-400 mb-1">Total Duration</p>
                <div class="stat-value"><span id="totalDuration">0</span> <span class="text-sm">mins</span></div>
            </div>
        </div>

        <div class="fitness-card mb-8">
            <h3 class="text-xl font-bold mb-6">Workout History</h3>
            <div id="historyList" class="space-y-4">
                <!-- History will be injected here -->
            </div>
        </div>
    </main>

    <script src="/script.js"></script>
</body>
</html>
